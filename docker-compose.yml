services:
  # Main application
  agent-runbook-generator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    depends_on:
      - otel-collector
    volumes:
      - ./repos:/repos:ro
    command: ["serve", "--port", "3000"]

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector:0.96.0
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    command: ["--config", "/etc/otel-collector-config.yaml"]

  # Jaeger for tracing
  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # Mock LLM server for testing
  mock-llm:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/mock-llm-response.json:/usr/share/nginx/html/api/response.json:ro

volumes:
  repos:
    driver: local
