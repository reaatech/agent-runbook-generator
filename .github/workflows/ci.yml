name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check

  test:
    runs-on: ubuntu-latest
    needs: [build, code-quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: npm run test:ci
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: [build, code-quality]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t agent-runbook-generator:${{ github.sha }} .

  runbook-validation:
    runs-on: ubuntu-latest
    needs: [build, code-quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Generate runbook for current repo
        run: npx agent-runbook-generator generate . --output runbook.md --provider mock
      - name: Validate runbook
        run: npx agent-runbook-generator validate runbook.md --ci --completeness-threshold 0.7
      - name: Upload runbook artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runbook
          path: runbook.md
          retention-days: 7
