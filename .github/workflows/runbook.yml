name: Runbook Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-runbook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate runbook for current repo
        run: npx agent-runbook-generator generate . --output runbook.md --provider mock

      - name: Validate runbook
        run: npx agent-runbook-generator validate runbook.md --ci --completeness-threshold 0.7

      - name: Upload runbook artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runbook
          path: runbook.md
          retention-days: 7
